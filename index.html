<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري تحميل النظام...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <video id="introVideo" autoplay muted playsinline>
        <source src="https://cdn.discordapp.com/attachments/1458875540655313062/1484215821185323179/0f5d28e31740cf0c.mp4?ex=69bd6b33&is=69bc19b3&hm=57b4cfeca2f87d6e122aa559aea7069c00fa6caa70f72bafc65ab610d5ddc277&" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('introVideo');
        
        // عند انتهاء الفيديو ينقلك تلقائياً لصفحة العمليات
        video.onended = function() {
            window.location.href = "home.html";
        };

        // حل احتياطي: إذا لم يشتغل الرابط خلال 6 ثواني، ينقلك لصفحة العمليات مباشرة
        setTimeout(() => {
            if (window.location.pathname.includes("index.html") || window.location.pathname.endsWith("/")) {
                window.location.href = "home.html";
            }
        }, 6000);
    </script>
</body>
</html>
