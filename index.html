<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري تحميل النظام...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <video id="introVideo" autoplay muted playsinline preload="auto" style="width: 100vw; height: 100vh; object-fit: cover;">
    <source src="intro.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

    <script>
    const video = document.getElementById('introVideo');

    // محاولة تشغيل الفيديو برمجياً لضمان البدء
    window.addEventListener('load', () => {
        video.play().catch(error => {
            console.log("Autoplay prevented, skipping to home...");
            // إذا منع المتصفح التشغيل، ننتظر 3 ثواني ثم ننتقل
            setTimeout(() => { window.location.href = "home.html"; }, 3000);
        });
    });

    // عند انتهاء الفيديو
    video.onended = function() {
        window.location.href = "home.html";
    };

    // حل احتياطي نهائي: الانتقال بعد 6 ثواني مهما حدث
    setTimeout(() => {
        window.location.href = "home.html";
    }, 6000);
</script>
</body>
</html>
