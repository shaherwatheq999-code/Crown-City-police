<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث مركز العمليات للشرطة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        body { background-color: #1a1e30; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #21253a; border-bottom: 2px solid #3c3f56; position: relative; padding: 10px; }
        #left-logo { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 45px; }
        .card-custom { background-color: #2d3148; border: 1px solid #3c3f56; border-radius: 10px; margin-bottom: 20px; }
        .form-control-custom { background-color: #1a1e30; border: 1px solid #3c3f56; color: white; padding: 10px; }
        .drop-zone { border: 2px dashed #6366f1; background-color: #21253a; padding: 50px; text-align: center; cursor: pointer; border-radius: 15px; }
        label { color: #cbd5e1; font-weight: bold; margin-top: 10px; display: block; }
        .loading-text { color: #10b981; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container-fluid d-flex justify-content-between align-items-center">
           
            <h1 class="h5 m-0">تحديث مركز العمليات للشرطة</h1>
            <div class="d-flex gap-2" style="margin-left: 60px;">
                
            </div>
          
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card card-custom">
            <div class="card-body">
                <h6>النتيجة النهائية (جاهزة للنسخ)</h6>
                <textarea id="finalResult" class="form-control form-control-custom" rows="15"></textarea>
                <div id="loadingStatus" class="loading-text mt-2">جاري المعالجة... ⏳</div>
            </div>
        </div>

        <div class="card card-custom">
            <div class="card-body row">
                <div class="col-md-6 border-end border-secondary">
                    <label>المستلم - الاسم</label>
                    <input type="text" id="recName" class="form-control form-control-custom" placeholder="أدخل الاسم">
                    <label>الكود</label>
                    <input type="text" id="recCode" class="form-control form-control-custom" placeholder="مثلاً K-1">
                </div>
                <div class="col-md-6">
                    <label>النائب - الاسم</label>
                    <input type="text" id="assName" class="form-control form-control-custom" placeholder="أدخل الاسم">
                    <label>الكود</label>
                    <input type="text" id="assCode" class="form-control form-control-custom" placeholder="مثلاً K-2">
                </div>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <h4 id="dropText">اضغط هنا أو اسحب صورة "قائمة الميدان"</h4>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <div class="text-center my-4">
            <button id="processBtn" class="btn btn-success btn-lg rounded-pill px-5">تحديث التنسيق النهائي</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const finalResult = document.getElementById('finalResult');
        const loadingStatus = document.getElementById('loadingStatus');

        let lastExtractedText = ""; // لحفظ النص إذا ضغطت الزر يدوياً

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                loadingStatus.style.display = 'block';
                Tesseract.recognize(file, 'ara+eng').then(({ data: { text } }) => {
                    loadingStatus.style.display = 'none';
                    lastExtractedText = text;
                    processData(text);
                });
            }
        };

        function processData(extractedText) {
            const rName = document.getElementById('recName').value;
            const rCode = document.getElementById('recCode').value;
            const aName = document.getElementById('assName').value;
            const aCode = document.getElementById('assCode').value;

            // 1. تنظيف الأسطر المستخرجة من الصورة
            let rawLines = extractedText.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 3);

            // 2. الفلترة: استثناء المستلم والنائب من القائمة (إذا كانت أسماؤهم موجودة في الصورة)
            let filteredLines = rawLines.filter(line => {
                const isRecipient = rName && line.includes(rName);
                const isAssistant = aName && line.includes(aName);
                return !isRecipient && !isAssistant;
            });

            // 3. الحساب: (الموجودين بالصورة بعد الفلترة) + (المستلم) + (النائب)
            // نتحقق إذا كان المستخدم عبأ الخانات فعلاً لنضيفهم للعدد
            let extraCount = 0;
            if (rName) extraCount++;
            if (aName) extraCount++;
            
            const totalCount = filteredLines.length + extraCount;
            const unitsList = filteredLines.map(line => `  - ${line}`).join('\n');

            const output = `
📌 استلام العمليات 📌

المستلم : (${rName || "---"}) | (${rCode || "---"})
النائب : (${aName || "---"}) | (${aCode || "---"})

عدد و اسماء الوحدات الموجودة في الميدان : ${totalCount}
${unitsList}

خارج الخدمة : 


🎙️ تم استلام العمليات و جاهزون للتعامل مع البلاغات
الملاحظات : تحديث
            `;
            finalResult.value = output.trim();
        }

        document.getElementById('processBtn').onclick = () => processData(lastExtractedText);
    </script>
</body>
</html>
